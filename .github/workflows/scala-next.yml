name: Scala Next canary

# Weekly check-only build against the latest Scala Next release
# (the repo itself stays on the 3.3.x LTS line). Catches upcoming
# source incompatibilities early; failures here block nothing.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:
  pull_request:
    paths: [".github/workflows/scala-next.yml"]

permissions:
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Resolve latest Scala Next release
        id: next
        run: |
          VERSION=$(curl -sf 'https://api.github.com/repos/scala/scala3/releases?per_page=30' |
            jq -r '[.[] | select(.prerelease | not) | .tag_name | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))]
                   | max_by(split(".") | map(tonumber))')
          test -n "$VERSION" && test "$VERSION" != "null"
          echo "Latest Scala Next: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compile + test on Scala Next
        run: sbt "++ ${{ steps.next.outputs.version }}!; Test/compile; testFull"
