name: Scala Steward

# Daily check for Scala / sbt / library updates. Opens PRs with the
# bumped versions; CI then validates them on the JDK 17 / 21 matrix.
#
# Manual trigger via the Actions tab is also available (workflow_dispatch).

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  steward:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Scala Steward
        uses: scala-steward-org/scala-steward-action@v2
        with:
          # GitHub PAT with repo scope. Set this in
          # Settings -> Secrets and variables -> Actions.
          # If unset, the action falls back to GITHUB_TOKEN
          # (which can read but cannot open cross-repo PRs).
          github-token: ${{ secrets.SCALA_STEWARD_TOKEN || secrets.GITHUB_TOKEN }}
          author-email: scala-steward@oluies.github.io
          author-name: Scala Steward
