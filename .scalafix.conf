// Phase 2 rule selection. Each rule is run as its own commit so the
// book can cite a specific commit per rewrite class. See plan.
rules = [
  ProcedureSyntax,
  NoValInForComprehension,
  NoAutoTupling,
  RedundantSyntax,
  LeakingImplicitClassVal,
  ExplicitResultTypes
]

ExplicitResultTypes {
  // pedagogical repo - only annotate genuinely public surface
  memberVisibility = [Public]
  skipSimpleDefinitions = ['Lit', 'Term.New']
}

// Caveat: ExplicitResultTypes annotates package-object re-exports
// (val X: X.type = ...) which Scala 2.13 reports as illegal cyclic
// references when type alias and value share a name. The 5
// package.scala files were reverted manually after the initial
// run. Re-running scalafixAll will re-introduce the issue; revert
// package.scala afterwards if so.
