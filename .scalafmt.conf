version = "3.8.6"
runner.dialect = scala3

maxColumn = 100
align.preset = none

// Pedagogical: leave both legacy brace-style and new significant-
// indentation listings as their authors wrote them. Don't rewrite
// brace <-> indent in either direction.
rewrite.scala3.convertToNewSyntax = false
rewrite.scala3.removeOptionalBraces = no

// Imports: stable order, single blank line between groups.
rewrite.rules = [SortImports]

indent.main = 2
indent.callSite = 2
indent.defnSite = 4

// Keep test source trees on the same dialect.
fileOverride {
  "glob:**/*.sbt" {
    runner.dialect = scala213
  }
}
